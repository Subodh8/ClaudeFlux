# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: claudeflux
    main: ./cmd/claudeflux
    binary: claudeflux
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: claudeflux
    format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request

brews:
  - repository:
      owner: Subodh8
      name: homebrew-claudeflux
    homepage: "https://github.com/Subodh8/ClaudeFlux"
    description: "Production-grade multi-agent orchestration runtime for Claude"
    license: "Apache-2.0"

dockers:
  - image_templates:
      - "ghcr.io/subodh8/claudeflux:{{ .Version }}"
      - "ghcr.io/subodh8/claudeflux:latest"
    dockerfile: Dockerfile
