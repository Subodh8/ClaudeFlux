version: "3.9"
 
services:
  claudeflux:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claudeflux-runtime
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDEFLUX_STATE_DIR=/data/state
      - CLAUDEFLUX_LOG_LEVEL=info
    volumes:
      - ./workflows:/workflows:ro
      - ./workspace:/workspace
      - claudeflux-data:/data/state
    ports:
      - "7070:7070"   # Dashboard
      - "7071:7071"   # SSE / IPC API
    command: ["run", "/workflows/workflow.yaml", "--dashboard"]
    healthcheck:
      test: ["CMD", "claudeflux", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
 
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: claudeflux-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_CLAUDEFLUX_API=http://claudeflux:7071
    ports:
      - "3000:3000"
    depends_on:
      - claudeflux
 
volumes:
  claudeflux-data:
